<svg width="100%" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
  <rect width="800" height="120" fill="url(#bg)"/>

  <!-- scattered stars, each with its own twinkle timing -->
  <circle cx="40"  cy="30" r="1.4" fill="#ffffff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="95"  cy="70" r="1"   fill="#ffffff">
    <animate attributeName="opacity" values="1;0.15;1" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="20" r="1.6" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="210" cy="55" r="1.1" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="90" r="1.3" fill="#ffffff">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="2.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="35" r="1"   fill="#ffffff">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="75" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="430" cy="25" r="1.2" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="60" r="1.4" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="95" r="1"   fill="#ffffff">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="590" cy="40" r="1.6" fill="#ffffff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="80" r="1.1" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="690" cy="30" r="1.3" fill="#ffffff">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="65" r="1"   fill="#ffffff">
    <animate attributeName="opacity" values="1;0.2;1" dur="3.0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="770" cy="95" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20"  cy="90" r="1.2" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
